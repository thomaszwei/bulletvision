version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# BulletVision — Production Docker Compose
# Run on Raspberry Pi with camera attached.
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── FastAPI backend + OpenCV detection ─────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: bulletvision-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite:////app/data/db/bulletvision.db
      - DATA_DIR=/app/data
      - DISABLE_MIGRATION=false
      - CAMERA_BACKEND=PICAMERA2
      # Force IPA to run as isolated subprocess — avoids signature-check
      # failures when container and host libcamera versions differ slightly.
      - LIBCAMERA_IPA_FORCE_ISOLATION=1
    # privileged: true gives extra Linux capabilities.
    # /dev:/dev mounts the FULL host /dev so libcamera can enumerate all
    # /dev/videoX, /dev/mediaX and VideoCore ISP nodes dynamically.
    # /run/udev is required so libcamera's camera enumerator can resolve
    # device nodes — without it global_camera_info() returns [].
    # Host IPA .so modules are bind-mounted to guarantee version consistency
    # with the sensor tuning that works on the Pi host OS.
    privileged: true
    volumes:
      # Keep snapshots on the host for easy access, but put the DB in a named
      # Docker volume to avoid host FS locking/permission issues (NFS/etc).
      - ./data/snapshots:/app/data/snapshots
      - db_data:/app/data/db
      # Camera access — all three mounts are required for libcamera in Docker
      - /dev:/dev
      - /run/udev:/run/udev:ro
      - /usr/lib/aarch64-linux-gnu/libcamera:/usr/lib/aarch64-linux-gnu/libcamera:ro
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    depends_on: []

  # ── React frontend (pre-built, served by nginx) ─────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: bulletvision-frontend
    restart: unless-stopped
    expose:
      - "80"

  # ── Outer nginx reverse proxy ───────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started

volumes:
  db_data:
    driver: local

networks:
  default:
    driver: bridge
