version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# BulletVision — Production Docker Compose
# Run on Raspberry Pi with camera attached.
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── FastAPI backend + OpenCV detection ─────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: bulletvision-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite:////app/data/db/bulletvision.db
      - DATA_DIR=/app/data
      - DISABLE_MIGRATION=false
      - CAMERA_BACKEND=PICAMERA2
    # privileged gives the container access to all /dev/videoX, /dev/mediaX and
    # VideoCore nodes that libcamera enumerates dynamically at runtime on Pi.
    privileged: true
    devices:
      - /dev/video0:/dev/video0
      - /dev/media0:/dev/media0
      - /dev/vchiq:/dev/vchiq
      - /dev/vcsm-cma:/dev/vcsm-cma
    group_add:
      - video
      - render
    volumes:
      # Keep snapshots on the host for easy access, but put the DB in a named
      # Docker volume to avoid host FS locking/permission issues (NFS/etc).
      - ./data/snapshots:/app/data/snapshots
      - db_data:/app/data/db
      # Mount host libcamera IPA pipeline handlers (sensor tuning files)
      - /usr/share/libcamera:/usr/share/libcamera:ro
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    depends_on: []

  # ── React frontend (pre-built, served by nginx) ─────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: bulletvision-frontend
    restart: unless-stopped
    expose:
      - "80"

  # ── Outer nginx reverse proxy ───────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      backend:
        condition: service_healthy
      frontend:
        condition: service_started

volumes:
  db_data:
    driver: local

networks:
  default:
    driver: bridge
