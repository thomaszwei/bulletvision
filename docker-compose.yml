version: "3.9"

# ─────────────────────────────────────────────────────────────────────────────
# BulletVision — Production Docker Compose
# Run on Raspberry Pi with camera attached.
# ─────────────────────────────────────────────────────────────────────────────

services:

  # ── FastAPI backend + OpenCV detection ─────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: bulletvision-backend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite:////app/data/db/bulletvision.db
      - DATA_DIR=/app/data
    volumes:
      - ./data:/app/data
    # Pi camera device passthrough.
    # Adjust if your Pi uses a different device node.
    devices:
      - /dev/video0:/dev/video0
      # Uncomment the lines below if using libcamera / picamera2 directly:
      # - /dev/vcsm-cma:/dev/vcsm-cma
      # - /dev/vchiq:/dev/vchiq
      # - /dev/vcio:/dev/vcio
    group_add:
      - video
    expose:
      - "8000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    depends_on: []

  # ── React frontend (pre-built, served by nginx) ─────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    image: bulletvision-frontend
    restart: unless-stopped
    expose:
      - "80"

  # ── Outer nginx reverse proxy ───────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend

volumes: {}

networks:
  default:
    driver: bridge
